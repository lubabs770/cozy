# Minimal headless sway config for cozy verification.
#
# One virtual output at a fixed resolution so screenshots are deterministic.
output HEADLESS-1 resolution 1920x1080 position 0,0

# No wallpaper of our own — cozy IS the background layer we want to capture.
# Keep sway quiet: no bar, no default apps.
default_border none
focus_follows_mouse no
